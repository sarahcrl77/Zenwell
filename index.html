<style>
    :root {
        --obsidienne: #1a1a1a;
        --sunlight: #FEFA8F;
        --menthe: #E7FDE6;
        --text-main: #EEEDE8;
        --text-dim: #A0A0A0;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.15);
    }

    html, body {
        height: auto;
        min-height: 100%;
        background-color: var(--obsidienne);
        color: var(--text-main);
        font-family: 'Outfit', sans-serif;
        margin: 0;
        scroll-behavior: smooth;
    }

    .sidebar {
        width: 260px;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        background: #111111;
        border-right: 1px solid var(--glass-border);
        padding: 2rem 1.2rem;
        z-index: 1000;
        display: flex;
        flex-direction: column;
    }

    .nav-link {
        color: var(--text-dim);
        padding: 0.9rem 1rem;
        border-radius: 12px;
        margin-bottom: 0.5rem;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .nav-link:hover, .nav-link.active {
        background: var(--sunlight);
        color: #000 !important;
        font-weight: 600;
    }

    .nav-link i { margin-right: 15px; font-size: 1.2rem; }

    .main-content {
        margin-left: 260px;
        padding: 3rem;
        width: calc(100% - 260px);
    }

    /* (KEEP EVERYTHING EXACTLY AS IS — DO NOT MODIFY) */
</style>

        <h4 class="fw-bold m-0" id="sidebar-logo">ZEN<span style="color: var(--sunlight)">WELL</span></h4>

    <nav class="flex-grow-1">

</aside>

<main class="main-content">

<div id="zw-onboarding-overlay">
    <div class="zw-bg-blobs">
        <div class="zw-blob zw-blob-sunlight"></div>
        <div class="zw-blob zw-blob-menthe"></div>
    </div>
    
    <div class="zw-overlay-content">
        <div class="zw-logo-container">
            <img src="Logo.png" alt="ZenWell Logo" class="zw-hero-logo">
        </div>
        <p class="zw-tagline">L'équilibre ne se calcule pas, il se ressent.</p>
        <button id="zw-start-btn" class="zw-btn-premium">
            Commencer l’expérience
        </button>
    </div>
</div>

<style>
    #zw-onboarding-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--obsidienne);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: opacity 1000ms cubic-bezier(0.4, 0, 0.2, 1), visibility 1000ms;
    }

    .zw-bg-blobs {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        filter: blur(80px);
        opacity: 0.4;
        z-index: -1;
    }

    .zw-blob {
        position: absolute;
        border-radius: 50%;
        animation: float 20s infinite alternate ease-in-out;
    }

    .zw-blob-sunlight {
        width: 40vw;
        height: 40vw;
        background: var(--sunlight);
        top: -10%;
        right: -5%;
    }

    .zw-blob-menthe {
        width: 45vw;
        height: 45vw;
        background: var(--menthe);
        bottom: -15%;
        left: -10%;
        animation-delay: -5s;
    }

    @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(100px, 50px) scale(1.1); }
    }

    .zw-overlay-content {
        text-align: center;
        animation: fadeIn 1.5s ease-out forwards;
    }

    .zw-hero-logo {
        width: 320px;
        max-width: 80vw;
        height: auto;
        margin-bottom: 2rem;
        filter: drop-shadow(0 0 20px rgba(254, 250, 143, 0.2));
    }

    .zw-tagline {
        font-family: 'La Belle Aurore', cursive;
        font-size: 1.5rem;
        color: var(--text-main);
        margin-bottom: 3rem;
        opacity: 0.8;
    }

    .zw-btn-premium {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-main);
        border: 1px solid var(--glass-border);
        padding: 1.2rem 2.8rem;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 100px;
        backdrop-filter: blur(15px);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        cursor: pointer;
        letter-spacing: 0.5px;
    }

    .zw-btn-premium:hover {
        transform: scale(1.05);
        background: var(--sunlight);
        color: #000;
        border-color: var(--sunlight);
        box-shadow: 0 10px 30px rgba(254, 250, 143, 0.3);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .zw-overlay-hidden {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none;
    }

    /* Sidebar UI Adjustment after click */
    .zw-compact-icon {
        height: 32px;
        width: auto;
        animation: fadeIn 0.5s ease-in;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const startBtn = document.getElementById('zw-start-btn');
        const overlay = document.getElementById('zw-onboarding-overlay');
        const sidebarLogoContainer = document.getElementById('sidebar-logo');

        startBtn.addEventListener('click', () => {
            // 1. Hide Overlay
            overlay.classList.add('zw-overlay-hidden');

            // 2. Update Sidebar Logo with subtle transition
            if (sidebarLogoContainer) {
                sidebarLogoContainer.style.opacity = '0';
                
                setTimeout(() => {
                    // Replace text with compact icon (re-using logo file or similar treatment)
                    sidebarLogoContainer.innerHTML = `<img src="Logo.png" class="zw-compact-icon" alt="Z">`;
                    sidebarLogoContainer.style.opacity = '1';
                }, 400);
            }

            // Clean up DOM after transition to ensure no background processing
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1200);
        });
    });
</script>
