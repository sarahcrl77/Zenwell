<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Dashboard Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=La+Belle+Aurore&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --obsidienne: #1a1a1a; --sunlight: #FEFA8F; --menthe: #E7FDE6; --text-main: #EEEDE8; --text-dim: #A0A0A0; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.15); }
        body { background-color: var(--obsidienne); color: var(--text-main); font-family: 'Outfit', sans-serif; margin: 0; }
        
        .sidebar { width: 260px; height: 100vh; position: fixed; top: 0; left: 0; background: #111; border-right: 1px solid var(--glass-border); padding: 2rem 1.2rem; z-index: 1000; }
        .nav-link { color: var(--text-dim); padding: 0.9rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; display: flex; align-items: center; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: var(--sunlight); color: #000 !important; font-weight: 600; }
        .nav-link i { margin-right: 15px; font-size: 1.2rem; }

        .main-content { margin-left: 260px; padding: 3rem; }
        .zw-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 1.8rem; height: 100%; }
        
        .progress-circle-dashboard { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(var(--sunlight) 72%, var(--glass-border) 0deg); display: flex; align-items: center; justify-content: center; position: relative; }
        .progress-circle-dashboard::after { content: ""; position: absolute; inset: 10px; background: #1a1a1a; border-radius: 50%; }
        .progress-value-dashboard { position: relative; z-index: 10; font-size: 1.4rem; font-weight: 700; color: var(--sunlight); }
        
        .kpi-value { font-size: 2.5rem; font-weight: 700; }
        .handwritten { font-family: 'La Belle Aurore', cursive; color: var(--sunlight); font-size: 1.3rem; }
        .btn-sunlight { background: var(--sunlight); color: #000; border: none; border-radius: 14px; padding: 0.8rem 1.5rem; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="mb-5 px-3"><h4 class="fw-bold m-0">ZEN<span style="color: var(--sunlight)">WELL</span></h4></div>
        <nav>
            <a class="nav-link active" href="index.html"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
            <a class="nav-link" href="Mescours.html"><i class="bi bi-play-circle-fill"></i><span>Mes cours</span></a>
            <a class="nav-link" href="Mesobjectifs.html"><i class="bi bi-bullseye"></i><span>Mes objectifs</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold">Bonjour, Thomas <span class="handwritten ms-2">Prends soin de toi.</span></h1>
            <a href="Mesobjectifs.html" class="btn-sunlight">Gérer mes objectifs</a>
        </header>

        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="zw-card text-center">
                    <span class="text-dim small">ÉQUILIBRE GLOBAL</span>
                    <div class="d-flex justify-content-center mt-3"><div class="progress-circle-dashboard"><span class="progress-value-dashboard">72%</span></div></div>
                </div>
            </div>
            <div class="col-md-3"><div class="zw-card"><span class="text-dim small">SCORE BIEN-ÊTRE</span><p class="kpi-value text-success">88%</p><small>État : Optimal</small></div></div>
            <div class="col-md-3"><div class="zw-card"><span class="text-dim small">STREAK ACTUEL</span><div class="d-flex align-items-center gap-2"><p class="kpi-value">15</p><i class="bi bi-fire text-warning fs-2"></i></div></div></div>
            <div class="col-md-3"><div class="zw-card"><span class="text-dim small">SÉANCES (SEMAINE)</span><p class="kpi-value">12</p><small class="text-success">+20%</small></div></div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8"><div class="zw-card"><canvas id="lineChart" style="height:300px"></canvas></div></div>
            <div class="col-lg-4"><div class="zw-card"><canvas id="donutChart" style="height:300px"></canvas></div></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctxL = document.getElementById('lineChart').getContext('2d');
        new Chart(ctxL, { type: 'line', data: { labels: ['L','M','M','J','V','S','D'], datasets: [{ label: 'Énergie', data: [65, 59, 80, 81, 56, 85, 72], borderColor: '#FEFA8F', tension: 0.4 }] }, options: { plugins: { legend: { display: false } } } });
        const ctxD = document.getElementById('donutChart').getContext('2d');
        new Chart(ctxD, { type: 'doughnut', data: { labels: ['Yoga', 'HIIT', 'Méditation'], datasets: [{ data: [45, 35, 20], backgroundColor: ['#FEFA8F', '#E7FDE6', '#A0A0A0'], borderWidth: 0 }] } });
    </script>
</body>
</html>
