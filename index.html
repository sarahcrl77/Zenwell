<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Commencer l'expérience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --obsidian: #252525;
            --sunlight: #FEFA8F;
            --menthe: #E7FDE6;
            --transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Animated Background --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: breathe 15s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--sunlight);
            top: -10%;
            left: -10%;
            animation-duration: 18s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--menthe);
            bottom: -15%;
            right: -10%;
            animation-duration: 22s;
            animation-delay: -2s;
        }

        @keyframes breathe {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-2%, -5%) scale(0.9); }
        }

        /* --- Main Content --- */
        main {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        .logo-container {
            width: 280px;
            transition: var(--transition);
            animation: fadeIn 2s ease-out;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .cta-button {
            position: relative;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .cta-button:hover {
            border-color: var(--menthe);
            color: var(--obsidian);
            background: var(--menthe);
            box-shadow: 0 0 30px rgba(231, 253, 230, 0.4);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .logo-container { width: 200px; }
            .cta-button { padding: 15px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main>
        <div class="logo-container">
            <img src="Logo.png" alt="ZenWell Logo">
        </div>

        <a href="Dashboard.html" class="cta-button">
            Commencer l'expérience
        </a>
    </main>

</body>
</html>
