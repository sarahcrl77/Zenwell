<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Commencer l'expérience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --obsidian: #252525;
            --sunlight: #FEFA8F;
            --menthe: #E7FDE6;
            --transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Animated Background --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(30px); /* Flou très réduit pour bien voir les ronds */
            opacity: 0.8;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            /* Pulsation légère sans déplacement */
            animation: heartbeat 6s infinite ease-in-out;
            mix-blend-mode: screen;
        }

        /* 4 ronds qui pulsent légèrement */
        .blob-1 {
            width: 400px; height: 400px;
            background: var(--sunlight);
            top: 0%; left: 0%;
            animation-duration: 7s;
        }

        .blob-2 {
            width: 450px; height: 450px;
            background: var(--sunlight);
            bottom: 0%; right: 0%;
            animation-duration: 8s;
            animation-delay: -1s;
        }

        .blob-3 {
            width: 300px; height: 300px;
            background: var(--menthe);
            bottom: 0%; left: 0%;
            animation-duration: 9s;
            animation-delay: -2s;
        }

        .blob-4 {
            width: 350px; height: 350px;
            background: var(--menthe);
            top: 0%; right: 0%;
            animation-duration: 7.5s;
            animation-delay: -3s;
        }

        /* Pulsation douce façon battement de coeur */
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); opacity: 0.78; }
            18% { transform: scale(1.03); opacity: 0.9; }
            35% { transform: scale(1); opacity: 0.82; }
            52% { transform: scale(1.045); opacity: 0.95; }
            70% { transform: scale(1); opacity: 0.8; }
        }

        /* --- Main Content --- */
        main {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
            transform: translateY(-100px);
        }

        /* Logo ÉNORME avec animation de "respiration" et éclat */
        .logo-container {
            width: 550px; /* Taille massive */
            transition: var(--transition);
            animation: fadeIn 2s ease-out, logoPulse 4s infinite ease-in-out;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 20px rgba(231, 253, 230, 0.3)); /* Éclat sous le logo */
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        .cta-button {
            position: relative;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            margin-top: -130px;
            padding: 22px 50px;
            font-size: 1.3rem;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            backdrop-filter: blur(15px);
            overflow: hidden;
            animation: fadeIn 2s ease-out 0.8s both;
        }

        .cta-button:hover {
            border-color: var(--menthe);
            color: var(--obsidian);
            background: var(--menthe);
            box-shadow: 0 0 50px rgba(231, 253, 230, 0.6);
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .logo-container { width: 300px; }
            .cta-button { padding: 15px 30px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <main>
        <div class="logo-container">
            <img src="Logo.png" alt="ZenWell Logo">
        </div>

        <a href="Dashboard.html" class="cta-button">
            Commencer l'expérience
        </a>
    </main>

</body>
</html>
