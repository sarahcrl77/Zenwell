<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENWELL | Prenez soin de votre équilibre</title>
    <style>
        :root {
            --obsidienne: #0A0A0A;
            --sunlight: #FEFA8F;
            --menthe: #E7FDE6;
            --font-main: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-accent: 'La Belle Aurore', cursive;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidienne);
            color: #FFFFFF;
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Ambient Background */
        .ambient-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.7;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            animation: float infinite ease-in-out;
        }

        /* 10 Unique Floating Circles */
        .c1 { width: 400px; height: 400px; background: var(--sunlight); top: -10%; left: 10%; opacity: 0.3; animation-duration: 25s; }
        .c2 { width: 350px; height: 350px; background: var(--menthe); bottom: 10%; right: 5%; opacity: 0.25; animation-duration: 30s; animation-delay: -5s; }
        .c3 { width: 500px; height: 500px; background: var(--sunlight); bottom: -15%; left: 20%; opacity: 0.15; animation-duration: 35s; }
        .c4 { width: 300px; height: 300px; background: var(--menthe); top: 20%; right: 20%; opacity: 0.2; animation-duration: 22s; animation-delay: -2s; }
        .c5 { width: 250px; height: 250px; background: var(--sunlight); top: 40%; left: -5%; opacity: 0.1; animation-duration: 28s; }
        .c6 { width: 450px; height: 450px; background: var(--menthe); top: -5%; right: 10%; opacity: 0.12; animation-duration: 40s; }
        .c7 { width: 320px; height: 320px; background: var(--sunlight); bottom: 20%; left: 40%; opacity: 0.18; animation-duration: 32s; animation-delay: -10s; }
        .c8 { width: 280px; height: 280px; background: var(--menthe); top: 50%; right: 5%; opacity: 0.15; animation-duration: 26s; }
        .c9 { width: 380px; height: 380px; background: var(--sunlight); bottom: 5%; left: 10%; opacity: 0.08; animation-duration: 45s; }
        .c10 { width: 420px; height: 420px; background: var(--menthe); top: 15%; left: 30%; opacity: 0.1; animation-duration: 38s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, 50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Content Layer */
        .content {
            position: relative;
            z-index: 10;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            animation: fadeIn 2.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 180px;
            height: auto;
            margin-bottom: 0.5rem;
        }

        .logo-placeholder {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 300;
            letter-spacing: 0.05rem;
            opacity: 0.8;
            margin-bottom: 1rem;
        }

        /* Glassmorphism Button */
        .cta-button {
            display: inline-block;
            padding: 1.2rem 2.8rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .cta-button:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(231, 253, 230, 0.2);
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .tagline { font-size: 1.1rem; }
            .logo-placeholder { font-size: 2rem; }
            .cta-button { padding: 1rem 2rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="ambient-container">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
        <div class="circle c4"></div>
        <div class="circle c5"></div>
        <div class="circle c6"></div>
        <div class="circle c7"></div>
        <div class="circle c8"></div>
        <div class="circle c9"></div>
        <div class="circle c10"></div>
    </div>

    <div class="content">
        <div class="logo-container">
            <div class="logo-placeholder">ZENWELL</div>
        </div>
        
        <p class="tagline">Prenez soin de votre équilibre</p>

        <a href="index.html" class="cta-button">
            Commencer l’expérience
        </a>
    </div>

    <script>
        // Smooth transition effect before redirect
        document.querySelector('.cta-button').addEventListener('click', function(e) {
            e.preventDefault();
            const href = this.getAttribute('href');
            document.body.style.transition = 'opacity 0.8s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = href;
            }, 800);
        });
    </script>
</body>
</html>
