<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Commencer l'expérience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --obsidian: #252525;
            --sunlight: #FEFA8F;
            --menthe: #E7FDE6;
            --transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Animated Background --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(60px); /* Légère réduction du flou pour mieux voir les mouvements */
            opacity: 0.7;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            /* Animation plus nerveuse et variée */
            animation: breathe 12s infinite alternate ease-in-out;
        }

        /* Les 4 Ronds (un de chaque couleur de chaque côté) */
        .blob-1 {
            width: 450px;
            height: 450px;
            background: var(--sunlight);
            top: -10%;
            left: -10%;
            animation-duration: 15s;
        }

        .blob-2 {
            width: 550px;
            height: 550px;
            background: var(--menthe);
            bottom: -15%;
            right: -10%;
            animation-duration: 18s;
            animation-delay: -2s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: var(--sunlight);
            bottom: -10%;
            left: -5%;
            animation-duration: 20s;
            animation-delay: -5s;
        }

        .blob-4 {
            width: 400px;
            height: 400px;
            background: var(--menthe);
            top: -5%;
            right: -5%;
            animation-duration: 14s;
            animation-delay: -8s;
        }

        @keyframes breathe {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(15%, 15%) scale(1.2) rotate(10deg); }
            66% { transform: translate(-10%, 20%) scale(0.8) rotate(-15deg); }
            100% { transform: translate(5%, -10%) scale(1.1) rotate(5deg); }
        }

        /* --- Main Content --- */
        main {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* Logo plus gros avec effet de flottement et d'éclat */
        .logo-container {
            width: 420px; /* Augmenté de 280px à 420px */
            transition: var(--transition);
            animation: fadeIn 2s ease-out, floatLogo 6s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.1));
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .cta-button {
            position: relative;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .cta-button:hover {
            border-color: var(--menthe);
            color: var(--obsidian);
            background: var(--menthe);
            box-shadow: 0 0 30px rgba(231, 253, 230, 0.4);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .logo-container { width: 280px; }
            .cta-button { padding: 15px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div> <div class="blob blob-4"></div> </div>

    <main>
        <div class="logo-container">
            <img src="Logo.png" alt="ZenWell Logo">
        </div>

        <a href="Dashboard.html" class="cta-button">
            Commencer l'expérience
        </a>
    </main>

</body>
</html>
