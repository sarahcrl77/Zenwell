<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Mes Objectifs</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=La+Belle+Aurore&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --obsidienne: #1a1a1a; --sunlight: #FEFA8F; --text-main: #EEEDE8; --text-dim: #A0A0A0; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.15); }
        body { background-color: var(--obsidienne); color: var(--text-main); font-family: 'Outfit', sans-serif; }
        
        .sidebar { width: 260px; height: 100vh; position: fixed; top: 0; left: 0; background: #111; border-right: 1px solid var(--glass-border); padding: 2rem 1.2rem; z-index: 3000 !important; }
        .nav-link { color: var(--text-dim); padding: 0.9rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; display: flex; align-items: center; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: var(--sunlight); color: #000 !important; font-weight: 600; }
        .nav-link i { margin-right: 15px; font-size: 1.2rem; }

        .main-content { margin-left: 260px; padding: 3rem; }
        .zw-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 2rem; margin-bottom: 1.5rem; }
        
        #onboardingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .progress-circle { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(var(--sunlight) 70%, var(--glass-border) 0deg); display: flex; align-items: center; justify-content: center; position: relative; }
        .progress-circle::after { content: ""; position: absolute; inset: 12px; background: var(--obsidienne); border-radius: 50%; }
        .progress-value { position: relative; z-index: 10; font-size: 1.5rem; font-weight: 800; color: var(--sunlight); }
        
        input[type="range"] { accent-color: var(--sunlight); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="mb-5 px-3"><h4 class="fw-bold m-0">ZEN<span style="color: var(--sunlight)">WELL</span></h4></div>
        <nav>
            <a class="nav-link" href="index.html"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
            <a class="nav-link active" href="Mesobjectifs.html"><i class="bi bi-bullseye"></i><span>Mes objectifs</span></a>
            <a class="nav-link" href="Mescours.html"><i class="bi bi-play-circle-fill"></i><span>Mes cours</span></a>
        </nav>
    </aside>

    <div id="onboardingOverlay">
        <div class="zw-card text-center" style="max-width: 400px;">
            <h2 class="fw-bold mb-4">Prêt ?</h2>
            <button class="btn btn-warning w-100 fw-bold" onclick="finishOnboarding()">C'est parti</button>
        </div>
    </div>

    <main class="main-content">
        <h1 class="fw-bold mb-5">Mes Objectifs</h1>

        <div class="zw-card d-flex align-items-center justify-content-between mb-5">
            <div><h3 class="fw-bold m-0">Progression Totale</h3><p class="text-dim">Objectifs du mois d'avril</p></div>
            <div class="progress-circle"><span class="progress-value">70%</span></div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="zw-card">
                    <div class="d-flex justify-content-between"><span class="text-dim">SOMMEIL</span><i class="bi bi-moon-stars text-primary"></i></div>
                    <h2 class="fw-bold my-3">8.5 <small class="fs-6">heures/nuit</small></h2>
                    <input type="range" class="form-range" value="85">
                </div>
            </div>
            <div class="col-md-6">
                <div class="zw-card">
                    <div class="d-flex justify-content-between"><span class="text-dim">POIDS</span><i class="bi bi-speedometer2 text-success"></i></div>
                    <h2 class="fw-bold my-3">74.2 <small class="fs-6">kg</small></h2>
                    <p class="text-success small">Objectif : 72kg</p>
                </div>
            </div>
            <div class="col-md-12">
                <div class="zw-card">
                    <div class="d-flex justify-content-between"><span class="text-dim">SÉANCES HEBDO</span><span class="badge bg-warning text-dark">4 / 5</span></div>
                    <div class="progress mt-3" style="height: 10px; background: rgba(255,255,255,0.1)">
                        <div class="progress-bar bg-warning" style="width: 80%"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const storageKey = 'zenwell_onboarded';
        window.onload = () => {
            if (!localStorage.getItem(storageKey)) {
                document.getElementById('onboardingOverlay').style.display = 'flex';
            }
        };
        function finishOnboarding() {
            localStorage.setItem(storageKey, 'true');
            document.getElementById('onboardingOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
