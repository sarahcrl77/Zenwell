<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWell | Mes Objectifs</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=La+Belle+Aurore&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --obsidienne: #1a1a1a; --sunlight: #FEFA8F; --text-main: #EEEDE8; --text-dim: #A0A0A0; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.12); }
        body { background-color: var(--obsidienne); color: var(--text-main); font-family: 'Outfit', sans-serif; min-height: 100vh; }
        
        /* Sidebar fixée et toujours au-dessus */
        .sidebar { width: 260px; height: 100vh; position: fixed; top: 0; left: 0; background: #111; border-right: 1px solid var(--glass-border); padding: 2rem 1.2rem; z-index: 3000 !important; display: flex; flex-direction: column; }
        .nav-link { color: var(--text-dim); padding: 0.9rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; display: flex; align-items: center; text-decoration: none; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: var(--sunlight); color: #000 !important; font-weight: 600; }
        .nav-link i { margin-right: 15px; font-size: 1.2rem; }
        
        .main-content { margin-left: 260px; padding: 3rem; width: calc(100% - 260px); }
        .zw-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 2rem; }
        #onboardingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .btn-premium { background: var(--sunlight); color: #000; border: none; padding: 0.8rem 1.5rem; border-radius: 15px; font-weight: 700; text-decoration: none; }
        .progress-circle { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(var(--sunlight) 0deg, var(--glass-border) 0deg); display: flex; align-items: center; justify-content: center; position: relative; }
        .progress-circle::after { content: ""; position: absolute; inset: 12px; background: var(--obsidienne); border-radius: 50%; }
        .progress-value { position: relative; z-index: 10; font-size: 1.5rem; font-weight: 800; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="mb-5 px-3">
            <h4 class="fw-bold m-0">ZEN<span style="color: var(--sunlight)">WELL</span></h4>
        </div>
        <nav class="flex-grow-1">
            <a class="nav-link" href="index.html"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
            <a class="nav-link active" href="Mesobjectifs.html"><i class="bi bi-bullseye"></i><span>Mes objectifs</span></a>
            <a class="nav-link" href="Mescours.html"><i class="bi bi-play-circle-fill"></i><span>Mes cours</span></a>
        </nav>
        <div class="mt-auto">
            <button class="nav-link w-100 border-0 bg-transparent text-danger" onclick="localStorage.clear(); location.reload();">
                <i class="bi bi-arrow-counterclockwise"></i><span>Réinitialiser</span>
            </button>
        </div>
    </aside>

    <div id="onboardingOverlay">
        <div class="zw-card text-center" style="max-width: 500px;">
            <h2 class="fw-bold mb-4">Bienvenue !</h2>
            <p class="mb-4">Configure tes objectifs pour commencer.</p>
            <button class="btn-premium" onclick="saveInitialGoals()">C'est parti</button>
        </div>
    </div>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-start mb-5">
            <div>
                <h1 class="fw-bold mb-1">Mes objectifs</h1>
                <p class="text-dim">Suivez vos rituels quotidiens.</p>
            </div>
        </header>

        <div class="zw-card d-flex align-items-center justify-content-between mb-5">
            <h3 class="fw-bold">Équilibre Global</h3>
            <div class="progress-circle"><span class="progress-value" id="globalScoreText">0%</span></div>
        </div>

        </main>

    <script>
        // Logique de sauvegarde minimaliste pour tester
        function saveInitialGoals() {
            document.getElementById('onboardingOverlay').style.display = 'none';
            localStorage.setItem('zenwell_onboarded', 'true');
        }
        window.onload = () => {
            if(!localStorage.getItem('zenwell_onboarded')) {
                document.getElementById('onboardingOverlay').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
