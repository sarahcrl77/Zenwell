<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenWell | Mes Objectifs Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=La+Belle+Aurore&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
:root {
    --obsidienne:#1a1a1a;
    --sunlight:#FEFA8F;
    --menthe:#E7FDE6;
    --text-main:#EEEDE8;
    --text-dim:#A0A0A0;
    --glass:rgba(255,255,255,0.05);
    --glass-border:rgba(255,255,255,0.12);
}

body {
    background:var(--obsidienne);
    color:var(--text-main);
    font-family:Outfit;
}

/* SIDEBAR */
.sidebar{
    width:260px;height:100vh;position:fixed;left:0;top:0;
    background:#111;padding:2rem 1rem;border-right:1px solid var(--glass-border);
}
.nav-link{
    color:var(--text-dim);display:flex;align-items:center;
    padding:0.8rem;border-radius:12px;text-decoration:none;
}
.nav-link:hover,.nav-link.active{background:var(--sunlight);color:#000}

/* MAIN */
.main-content{margin-left:260px;padding:2rem}

/* CARDS */
.cardz{
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:24px;
    padding:1.5rem;
    backdrop-filter:blur(12px);
}

/* PROGRESS */
.progress{height:8px;background:#333}
.progress-bar{background:var(--sunlight)}

/* MOOD */
.mood-btn{
    font-size:1.8rem;
    background:transparent;
    border:1px solid var(--glass-border);
    border-radius:12px;
    padding:0.5rem;
    opacity:0.5;
}
.mood-btn.active{opacity:1;background:var(--sunlight)}
</style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
<h4>ZEN<span style="color:var(--sunlight)">WELL</span></h4>
<a class="nav-link" href="#">Dashboard</a>
<a class="nav-link active" href="#">Mes objectifs</a>
<a class="nav-link" href="#">Progression</a>
</aside>

<!-- MAIN -->
<div class="main-content">

<header class="d-flex justify-content-between mb-4">
<div>
<h1>Mes objectifs</h1>
<p class="text-dim">Suivi global de votre équilibre</p>
</div>

<button class="btn btn-warning" onclick="openOnboarding(true)">
Modifier objectifs
</button>
</header>

<!-- GLOBAL SCORE -->
<div class="cardz text-center mb-4">
<h3>Équilibre global</h3>
<h1 id="globalScore">0%</h1>
<div class="progress mt-2">
<div class="progress-bar" id="globalBar"></div>
</div>
<p id="msg" class="mt-3">Initialisation...</p>
</div>

<div class="row g-3">

<!-- SOMMEIL -->
<div class="col-md-4">
<div class="cardz">
<h5>Sommeil</h5>
<input type="range" min="4" max="12" id="sleep" oninput="updateSleep(this.value)">
<div class="progress mt-2"><div id="sleepBar"></div></div>
</div>
</div>

<!-- POIDS -->
<div class="col-md-4">
<div class="cardz">
<h5>Poids</h5>
<input type="number" id="weight">
<div class="progress mt-2"><div id="weightBar"></div></div>
</div>
</div>

<!-- SPORT -->
<div class="col-md-4">
<div class="cardz">
<h5>Sport</h5>
<button class="btn btn-sm btn-light" onclick="addSession()">+ séance</button>
<p id="sportText"></p>
<div class="progress"><div id="sportBar"></div></div>
</div>
</div>

</div>

<!-- MOOD -->
<div class="cardz mt-4">
<h5>Humeur</h5>
<div class="d-flex gap-2">
<button class="mood-btn" onclick="setMood('happy',this)">😃</button>
<button class="mood-btn" onclick="setMood('neutral',this)">😐</button>
<button class="mood-btn" onclick="setMood('tired',this)">😴</button>
</div>
</div>

</div>

<script>

/* DATA */
let data = JSON.parse(localStorage.getItem("zenwell_goals")) || {
    sleep:7,
    weight:75,
    target:70,
    sport:0,
    mood:null
};

/* INIT */
window.onload = () => {
    document.getElementById("sleep").value = data.sleep;
    document.getElementById("weight").value = data.weight;
    render();
};

/* SAVE */
function save(){
    localStorage.setItem("zenwell_goals", JSON.stringify(data));
    render();
}

/* UPDATE SLEEP */
function updateSleep(v){
    data.sleep = v;
    save();
}

/* SPORT */
function addSession(){
    data.sport++;
    save();
}

/* MOOD */
function setMood(mood,el){
    data.mood = mood;
    document.querySelectorAll(".mood-btn").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
    save();
}

/* RENDER */
function render(){

    document.getElementById("sportText").innerText = data.sport + " séances";

    let score =
        (data.sleep/8)*30 +
        (1 - Math.abs(data.weight-data.target)/20)*30 +
        (data.sport/5)*25 +
        (data.mood?15:0);

    score = Math.max(0,Math.min(100,Math.round(score)));

    document.getElementById("globalScore").innerText = score+"%";
    document.getElementById("globalBar").style.width = score+"%";

    document.getElementById("sleepBar").style.width = (data.sleep/8*100)+"%";
    document.getElementById("weightBar").style.width = (100 - Math.abs(data.weight-data.target)*5)+"%";
    document.getElementById("sportBar").style.width = (data.sport/5*100)+"%";

    document.getElementById("msg").innerText =
        score>80 ? "Excellent équilibre 🔥" :
        score>50 ? "Bonne progression 💪" :
        "Continue tes efforts ✨";
}

/* RESET */
function resetGoals(){
    localStorage.removeItem("zenwell_goals");
    location.reload();
}

</script>

</body>
</html>
